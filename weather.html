<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <link rel="stylesheet" href="weather.css" />
  </head>
  <body>
    <h1>🌍 Live Weather Dashboard</h1>
    <div class="weather-container">
      <div class="section"><h2 id="city">Loading city...</h2></div>
      <div class="section">
        <img id="icon" class="icon" src="" alt="weather icon" />
        <p id="main"></p>
        <p id="description"></p>
      </div>
      <div class="section">
        <p>
          <span class="label">Temperature:</span> <span id="temp"></span> °C
        </p>
        <p>
          <span class="label">Feels Like:</span>
          <span id="feels_like"></span> °C
        </p>
        <p>
          <span class="label">Min:</span> <span id="temp_min"></span> °C |
          <span class="label">Max:</span> <span id="temp_max"></span> °C
        </p>
      </div>
      <div class="section">
        <p><span class="label">Humidity:</span> <span id="humidity"></span>%</p>
        <p>
          <span class="label">Pressure:</span> <span id="pressure"></span> hPa
        </p>
        <p>
          <span class="label">Visibility:</span> <span id="visibility"></span> m
        </p>
      </div>
      <div class="section">
        <p>
          <span class="label">Wind:</span> <span id="wind_speed"></span> m/s at
          <span id="wind_deg"></span>°
        </p>
        <p>
          <span class="label">Cloud Coverage:</span> <span id="clouds"></span>%
        </p>
      </div>
      <div class="section">
        <p><span class="label">Sunrise:</span> <span id="sunrise"></span></p>
        <p><span class="label">Sunset:</span> <span id="sunset"></span></p>
      </div>
    </div>

    <script src="weather.js"></script>
  </body>
</html>
